<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color study</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <h1>Color study</h1>
    </header>

      <section class="experiment" aria-live="polite">
        <div class="trial-header">
            <h5 class="eyebrow">First, enter your email. Then choose colors that best match shapes, and adjust sliders for the final set.</h5>
            <div class="progress-chip" id="progress-chip">1 / 19</div>
        </div>

        <div id="email-panel" class="control hidden">
          <label for="email-input">Enter your email to receive a $25 gift card:</label>
          <input id="email-input" type="email" placeholder="your.email@example.com" aria-label="Email address" />
        </div>

        <div class="preview-panel panel">
          <div id="svg-host" class="svg-host" aria-label="Stimulus preview" role="img"></div>
        </div>

        <div id="question-text" class="eyebrow">Choose the color that best matches this shape.</div>

        <div id="slider-panel" class="control">
          <label class="control" aria-label="Response slider">
            <input id="temperature-slider" type="range" min="2000" max="10000" step="50" value="4500" />
          </label>
        </div>

        <div id="categorical-panel" class="control hidden">
          <label for="color-select">Which color matches this shape?</label>
          <select id="color-select" aria-label="Color choice">
            <option value="">Select a color</option>
            <option value="red">Red</option>
            <option value="orange">Orange</option>
            <option value="yellow">Yellow</option>
            <option value="green">Green</option>
            <option value="blue">Blue</option>
            <option value="purple">Purple</option>
            <option value="pink">Pink</option>
            <option value="black">Black</option>
            <option value="white">White</option>
            <option value="brown">Brown</option>
            <option value="gray">Gray</option>
          </select>
        </div>

        <div class="actions">
          <button type="button" id="prev-button">Back</button>
          <button type="button" class="primary" id="next-button">Next</button>
        </div>
      </section>

      <section class="results-panel hidden" id="results-panel">
        <div class="trial-header">
          <div>
            <p class="eyebrow">Done</p>
            <h2>Thanks for completing the survey.</h2>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
